<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="200" cy="150" r="120" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="200" cy="150" r="90" fill="url(#grad1)" opacity="0.15"/>
  
  <!-- 代码符号 -->
  <text x="120" y="170" font-family="monospace" font-size="60" font-weight="bold" fill="url(#grad1)">&lt;/&gt;</text>
  
  <!-- 装饰元素 -->
  <circle cx="80" cy="80" r="8" fill="#4f46e5" opacity="0.6"/>
  <circle cx="320" cy="220" r="6" fill="#06b6d4" opacity="0.6"/>
  <circle cx="330" cy="80" r="4" fill="#4f46e5" opacity="0.4"/>
  <circle cx="70" cy="220" r="5" fill="#06b6d4" opacity="0.4"/>
  
  <!-- 线条装饰 -->
  <path d="M50 150 L90 130" stroke="#4f46e5" stroke-width="2" opacity="0.3"/>
  <path d="M350 150 L310 170" stroke="#06b6d4" stroke-width="2" opacity="0.3"/>
</svg>
